<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="info"></p>
    <script>
        const person = '{"name": "John", "age": 30, "location": "New York" }'
        const personInfo = JSON.parse(person)
    document.getElementById("info").innerHTML = personInfo.name + " is " + personInfo.age + " and lives in " + personInfo.location

    </script>
</body>
</html>
